# Starship Prompt Configuration
# Matrix/Cyberpunk themed prompt

format = """
[┌─](bold green)
[│](green)$directory
[─>](green)$git_branch
$git_status
[└─](bold green)$character"""

add_newline = true

[directory]
style = "bold green"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "cyan"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "⚔️ "
untracked = "🛤️ "
stashed = "📦 "
modified = "📝 "
staged = '[++](green) '
ahead = "↑"
behind = "↓"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold blue)"

[aws]
style = "bold yellow"
symbol = "☁️  "

[dotnet]
style = "bold cyan"
symbol = "⬡ "

[docker]
style = "bold blue"
symbol = "🐳 "

[elixir]
style = "bold purple"
symbol = "💧 "

[elm]
style = "bold yellow"
symbol = "🌳 "

[git_metrics]
disabled = true

[golang]
style = "bold cyan"
symbol = "🐹 "

[helm]
style = "bold blue"
symbol = "⎈ "

[java]
style = "bold red"
symbol = "☕ "

[julia]
style = "bold purple"
symbol = "⎔ "

[memory]
disabled = true

[nix_shell]
style = "bold blue"

[node]
style = "bold green"
symbol = "⬢ "

[package]
style = "bold cyan"

[python]
style = "bold yellow"
symbol = "🐍 "

[ruby]
style = "bold red"
symbol = "💎 "

[rust]
